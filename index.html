<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ADF23F" />
    <meta name="color-scheme" content="light" />

    <!-- Primary -->
    <title>
      reformant — university autopilot. write brilliant reports while you sleep.
    </title>
    <meta
      name="description"
      content="reformant is the AI university autopilot. Drop a PDF, a GitHub link, or just a topic — get a fully drafted, citation-accurate, uni-formatted paper in minutes. Free forever plan. Cancel anytime."
    />
    <meta
      name="keywords"
      content="ai report writer, ai essay generator, university autopilot, academic writing ai, thesis ai, citation generator, apa mla harvard, student ai, research paper ai, reformant"
    />
    <meta name="author" content="Shiftline" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1"
    />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://reformant.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="reformant" />
    <meta property="og:title" content="reformant — university autopilot" />
    <meta
      property="og:description"
      content="Drop a PDF, GitHub link, or a topic. Get a polished, cited, formatted paper in minutes. Free to start."
    />
    <meta property="og:url" content="https://reformant.com/" />
    <meta property="og:image" content="https://reformant.com/assets/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="reformant — a university report being generated from a single prompt"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@reformant" />
    <meta name="twitter:creator" content="@reformant" />
    <meta name="twitter:title" content="reformant — university autopilot" />
    <meta
      name="twitter:description"
      content="AI that writes your uni reports end-to-end — structure, citations, charts, formatting. Free to try."
    />
    <meta name="twitter:image" content="https://reformant.com/assets/og.png" />

    <!-- Favicons / PWA icons -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%assets/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="%BASE_URL%assets/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Hreflang -->
    <link rel="alternate" hreflang="en" href="https://reformant.com/" />
    <link rel="alternate" hreflang="de" href="https://reformant.com/de/" />
    <link rel="alternate" hreflang="fr" href="https://reformant.com/fr/" />
    <link rel="alternate" hreflang="es" href="https://reformant.com/es/" />
    <link rel="alternate" hreflang="x-default" href="https://reformant.com/" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/ttf"
      crossorigin
      href="/fonts/FunnelSans-VariableFont_wght.ttf"
    />
    <link
      rel="preload"
      as="font"
      type="font/ttf"
      crossorigin
      href="/fonts/RethinkSans-VariableFont_wght.ttf"
    />
    <link rel="preload" as="image" href="%BASE_URL%assets/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400;1,600&display=swap"
    />

    <!-- Structured data — Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "reformant",
        "legalName": "Shiftline",
        "url": "https://reformant.com/",
        "logo": "https://reformant.com/assets/favicon.svg",
        "description": "AI university autopilot — generates polished, cited, uni-formatted academic reports from a single prompt.",
        "sameAs": [
          "https://twitter.com/reformant",
          "https://instagram.com/reformant",
          "https://www.tiktok.com/@reformant"
        ]
      }
    </script>

    <!-- Structured data — WebSite with SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "reformant",
        "url": "https://reformant.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://reformant.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Structured data — SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "reformant",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "description": "AI academic report generator — PDF, GitHub, or topic in; fully drafted, cited, formatted paper out.",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Unlimited Power",
            "price": "12",
            "priceCurrency": "USD"
          }
        ]
      }
    </script>

    <!-- Structured data — FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is this cheating?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "reformant is a drafting tool. You review, edit, and own the final work. It's no different from using a research assistant or a tutor — you are responsible for what you submit."
            }
          },
          {
            "@type": "Question",
            "name": "Will my university detect it?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Everything reformant writes passes current AI-detection tools, including Turnitin and GPTZero. You should still review and edit like any first draft."
            }
          },
          {
            "@type": "Question",
            "name": "What if the sources are made up?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "They aren't. Every citation is fetched from a real paper via Semantic Scholar, Crossref, or arXiv and cross-verified before being included."
            }
          },
          {
            "@type": "Question",
            "name": "Can I cancel anytime?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Cancel anytime, no questions asked. You keep access until the end of your billing period."
            }
          }
        ]
      }
    </script>

    <!-- Structured data — Breadcrumb -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://reformant.com/"
          }
        ]
      }
    </script>
  </head>
  <body>
    <a
      href="#main"
      class="sr-only"
      style="
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 8px 12px;
        background: #1d3a00;
        color: #adf23f;
        z-index: 1000;
        border-radius: 8px;
      "
      >skip to main content</a
    >

    <noscript>
      <div
        style="
          padding: 40px 24px;
          max-width: 720px;
          margin: 0 auto;
          font-family: system-ui, sans-serif;
        "
      >
        <h1>reformant — university autopilot</h1>
        <p>
          AI that drafts your university reports end-to-end. Drop a PDF, a
          GitHub repository, or just a topic. Get a polished, cited,
          uni-formatted paper in minutes. Free forever plan. Please enable
          JavaScript for the full experience.
        </p>
      </div>
    </noscript>

    <div id="root" role="main"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
